# Data contract — Lab Day 10 (tiếp nối artifact CS + IT Helpdesk)

version: "1.0"
dataset: "kb_chunk_export"
owner_team: "Platform Data + CS/IT Knowledge Ops"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "ID ổn định sau clean (hash doc_id + chunk_text + seq)"
  doc_id:
    type: string
    required: true
    description: "Khóa logic tài liệu nguồn (vd policy_refund_v4)"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Không được để chunk policy refund chứa cửa sổ 14 ngày (lệch so với v4 = 7 ngày)"
    severity: "halt"
  - id: "grading_sources_coverage"
    description: "Mỗi doc_id trong bộ grading phải có ≥1 chunk sau clean"
    severity: "halt"
  - id: "hr_has_current_12d_annual"
    description: "Phải giữ ít nhất một chunk HR 2026 (12 ngày phép)"
    severity: "halt"

freshness:
  measured_at: "publish"
  sla_hours: 2160
  alert_channel: "#data-platform-alerts"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
    owner: "CS Policy Team"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
    owner: "IT Operations"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
    owner: "IT Helpdesk"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"
    owner: "HR"
  - path: "data/docs/access_control_sop.txt"
    doc_id: "access_control_sop"
    owner: "IT Security"

allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy
  - access_control_sop

policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
